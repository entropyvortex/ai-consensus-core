name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # `npm install` (not `npm ci`) works around npm/cli#4828: vitest 4.x pulls
      # rolldown's platform-specific native bindings as optional deps, and
      # `npm ci` can skip them on certain lockfile/platform combinations.
      - run: npm install
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
